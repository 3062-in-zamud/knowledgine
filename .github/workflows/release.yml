name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "::error::Failed to extract version from package.json"
            exit 1
          fi
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: v${VERSION}"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already released
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.version }} already exists. Skipping release."

      - uses: pnpm/action-setup@v4
        if: steps.tag_check.outputs.exists == 'false'

      - uses: actions/setup-node@v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Verify
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm run verify

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Publish @knowledgine/core
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm --filter @knowledgine/core publish --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @knowledgine/ingest
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm --filter @knowledgine/ingest publish --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @knowledgine/mcp-server
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm --filter @knowledgine/mcp-server publish --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @knowledgine/cli
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm --filter @knowledgine/cli publish --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        run: gh release create "${{ steps.version.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
