name: KPI Alert

on:
  # Run every Monday at 09:00 UTC (18:00 JST)
  schedule:
    - cron: "0 9 * * 1"
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print violations without creating issues)"
        required: false
        default: "false"
        type: boolean

jobs:
  check-kpi:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run KPI threshold check
        run: node --experimental-strip-types scripts/check-kpi-thresholds.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          VERBOSE: "1"
        # Exit code 1 means thresholds were violated — treated as a soft failure
        # (the workflow itself should not block CI green status).
        continue-on-error: true

      - name: Check result
        run: |
          echo "KPI check completed. Review any newly created issues labelled 'kpi-alert'."
          echo "Repository: https://github.com/${{ github.repository }}/issues?labels=kpi-alert"
